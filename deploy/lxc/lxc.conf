# Example LXC config for running Editoro containerized with Docker inside Ubuntu.
# Update paths and network values for your host before use.

lxc.include = /usr/share/lxc/config/common.conf
lxc.arch = linux64
lxc.uts.name = editoro
lxc.rootfs.path = dir:/var/lib/lxc/editoro/rootfs

lxc.net.0.type = veth
lxc.net.0.link = lxcbr0
lxc.net.0.flags = up
lxc.net.0.name = eth0

lxc.cgroup2.memory.max = 2G
lxc.cgroup2.cpuset.cpus = 0-1

# Persist Editoro data outside container rootfs.
lxc.mount.entry = /var/lib/editoro/data var/lib/editoro/data none bind,create=dir 0 0
